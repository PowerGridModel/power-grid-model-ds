name: Check Code Quality

on:
  # run pipeline from another workflow
  workflow_call:
    inputs:
      update_dependencies:
        type: boolean
        description: Update dependencies to their latest version
        default: false
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-code-quality
  cancel-in-progress: true

jobs:
  check-code-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: ${{ always() }}
        with:
          activate-environment: true
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: install poe
        if: ${{ always() }}
        run: uv tool install poethepoet

      - name: Install dependencies
        if: ${{ always() }}
        run: uv sync --frozen --dev

      - name: Update dependencies
        if: ${{ inputs.update_dependencies && always() }}
        run: uv sync --upgrade --dev

      - name: lint
        if: ${{ always() }}
        run: poe lint --check
      - name: format
        if: ${{ always() }}
        run: poe format --check
      - name: clean notebooks
        if: ${{ always() }}
        run: poe clean_notebooks --check
      - name: test notebooks
        if: ${{ always() }}
        run: poe test_notebooks
      - name: lock
        if: ${{ always() }}
        run: poe lock
      - name: type
        if: ${{ always() }}
        run: poe type
      - name: cover
        if: ${{ always() }}
        run: poe cover
      - name: report
        if: ${{ always() }}
        run: poe report

      - name: Actually stop now if any quality control failed
        if: ${{ failure() }}
        run: exit 1