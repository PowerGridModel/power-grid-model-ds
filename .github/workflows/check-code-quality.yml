name: Check Code Quality

on:
  # run pipeline from another workflow
  workflow_call:
    inputs:
      update_dependencies:
        type: boolean
        description: Update dependencies to their latest version
        default: false
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-code-quality
  cancel-in-progress: true

jobs:
  check-code-quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout source code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: ${{ always() }}
        with:
          activate-environment: true
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: install poe
        if: ${{ always() }}
        run: uv tool install poethepoet

      - name: Install dependencies
        if: ${{ always() }}
        run: uv sync --frozen --dev

      - name: Update dependencies
        if: ${{ inputs.update_dependencies && always() }}
        run: uv sync --upgrade --dev

      - name: lint
        if: ${{ always() }}
        run: poe lint --check
      - name: format
        if: ${{ always() }}
        run: poe format --check
      - name: clean notebooks
        if: ${{ always() }}
        run: poe clean_notebooks --check
      - name: test notebooks
        if: ${{ always() }}
        run: poe test_notebooks
      - name: lock
        if: ${{ always() }}
        run: poe lock
      - name: type
        if: ${{ always() }}
        run: poe type
      - name: cover
        if: ${{ always() }}
        run: poe cover
      - name: report
        if: ${{ always() }}
        run: poe report

      - name: Actually stop now if any quality control failed
        if: ${{ failure() }}
        run: exit 1